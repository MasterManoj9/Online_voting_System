<!DOCTYPE html>
<html>
<head>
    <title>Register - Online Voting System</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #FFE0B2 0%, #FFF3E0 40%, #FFFDE7 100%) !important;
        }
    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <img src="https://cdn-icons-png.flaticon.com/512/1048/1048953.png" width="60">
    <h1>Online Voting System</h1>
    <p>ELECTION COMMISSION OF INDIA</p>
</div>

<hr>

<!-- Register Box -->
<div class="login-container">

    <h2>Register</h2>

    <input type="text" id="name" placeholder="Enter your name" required>

    <input type="text" id="phone" placeholder="+91XXXXXXXXXX" required>

    <input type="password" id="password" placeholder="Enter password" required>

    <!-- Camera -->
    <video id="video" width="200" autoplay></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <button onclick="startCamera()">Start Camera</button>
    <button onclick="captureFace()">Capture Face</button>

    <!-- Firebase OTP -->
    <div id="recaptcha-container"></div>

    <button onclick="sendOTP()">Send OTP</button>

    <input type="text" id="otp" placeholder="Enter OTP">

    <button onclick="verifyOTP()">Verify OTP</button>

    <p id="timer">05:00</p>

    <button onclick="registerUser()">Register</button>

    <div id="loading" style="display:none;">⏳ Processing...</div>
    <div id="success" style="display:none;color:green;">✅ Registered Successfully!</div>

    <p class="register-text">
        Already have account? <a href="index.html">Login</a>
    </p>

</div>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="script.js"></script>

</body>
</html>
